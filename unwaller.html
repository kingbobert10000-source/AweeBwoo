<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unwaller Page</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    function draw() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      // White background
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Nav logo
      ctx.fillStyle = '#000000';
      ctx.font = 'bold 24px sans-serif';
      ctx.letterSpacing = '0.12em';
      ctx.fillText('AWEEBWOO', 48, 44);

      // Body text
      ctx.font = '20px sans-serif';
      ctx.letterSpacing = '0';
      const lines = [
        'Unwaller:',
        '',
        '- Unwaller doesn\'t exist idk why you came here. You aren\'t even supposed to',
        '  be able to get here from the main page, you had to type it manually, why',
        '  did you type the entire thing manually?',
        '- Also, flashbang.',
      ];
      const startX = canvas.width * 0.17;
      let y = canvas.height / 2 - 40;
      for (const line of lines) {
        ctx.fillText(line, startX, y);
        y += line === '' ? 14 : 28;
      }
    }

    draw();
    window.addEventListener('resize', draw);
  </script>
</body>
</html>
