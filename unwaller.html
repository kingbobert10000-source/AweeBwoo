<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UNWALLER</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useCallback } = React;

const G = {
  bg: "#070707",
  panel: "#0f0f0f",
  border: "#1e1e1e",
  accent: "#00FF88",
  accentDim: "#00ff8833",
  text: "#ffffff",
  muted: "#444",
};

const css = `
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: ${G.bg}; }
  @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.3 } }
  @keyframes bar1 { 0%,100%{height:8px} 50%{height:32px} }
  @keyframes bar2 { 0%,100%{height:20px} 50%{height:10px} }
  @keyframes bar3 { 0%,100%{height:14px} 50%{height:38px} }
  @keyframes bar4 { 0%,100%{height:30px} 50%{height:12px} }
  @keyframes bar5 { 0%,100%{height:10px} 50%{height:28px} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
`;

function encodeWAV(audioBuffer) {
  const ch = audioBuffer.numberOfChannels;
  const sr = audioBuffer.sampleRate;
  const len = audioBuffer.length;
  const dataSize = len * ch * 2;
  const buf = new ArrayBuffer(44 + dataSize);
  const v = new DataView(buf);
  const ws = (off, s) => { for (let i = 0; i < s.length; i++) v.setUint8(off + i, s.charCodeAt(i)); };
  ws(0, "RIFF"); v.setUint32(4, 36 + dataSize, true);
  ws(8, "WAVE"); ws(12, "fmt ");
  v.setUint32(16, 16, true); v.setUint16(20, 1, true);
  v.setUint16(22, ch, true); v.setUint32(24, sr, true);
  v.setUint32(28, sr * ch * 2, true); v.setUint16(32, ch * 2, true);
  v.setUint16(34, 16, true); ws(36, "data");
  v.setUint32(40, dataSize, true);
  let off = 44;
  for (let i = 0; i < len; i++) {
    for (let c = 0; c < ch; c++) {
      const s = Math.max(-1, Math.min(1, audioBuffer.getChannelData(c)[i]));
      v.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      off += 2;
    }
  }
  return new Blob([buf], { type: "audio/wav" });
}

function App() {
  const [phase, setPhase] = useState("idle");
  const [outputName, setOutputName] = useState("");
  const [downloadUrl, setDownloadUrl] = useState(null);
  const [dragging, setDragging] = useState(false);
  const inputRef = useRef();
  const urlRef = useRef(null);

  const process = useCallback(async (file) => {
    if (!file || !file.type.startsWith("audio/")) return;
    setPhase("processing");
    if (urlRef.current) URL.revokeObjectURL(urlRef.current);

    const ab = await file.arrayBuffer();
    const tmp = new AudioContext();
    const decoded = await tmp.decodeAudioData(ab);
    await tmp.close();

    const ctx = new OfflineAudioContext(decoded.numberOfChannels, decoded.length, decoded.sampleRate);
    const src = ctx.createBufferSource();
    src.buffer = decoded;

    const specs = [
      { type: "peaking",   freq: 300,  Q: 1.2, gain: -4 },
      { type: "peaking",   freq: 2500, Q: 0.8, gain:  7 },
      { type: "peaking",   freq: 5000, Q: 1.0, gain:  5 },
      { type: "highshelf", freq: 8000,          gain:  8 },
    ];

    const filters = specs.map(({ type, freq, Q, gain }) => {
      const f = ctx.createBiquadFilter();
      f.type = type;
      f.frequency.value = freq;
      if (Q != null) f.Q.value = Q;
      f.gain.value = gain;
      return f;
    });

    const comp = ctx.createDynamicsCompressor();
    comp.threshold.value = -3;
    comp.knee.value = 3;
    comp.ratio.value = 4;
    comp.attack.value = 0.003;
    comp.release.value = 0.1;

    [src, ...filters, comp].reduce((a, b) => { a.connect(b); return b; });
    comp.connect(ctx.destination);
    src.start(0);

    const rendered = await ctx.startRendering();
    const blob = encodeWAV(rendered);
    const url = URL.createObjectURL(blob);
    urlRef.current = url;
    const base = file.name.replace(/\.[^.]+$/, "");
    setOutputName(`${base}_unwalled.wav`);
    setDownloadUrl(url);
    setPhase("done");
  }, []);

  const onFile = (file) => { if (file) process(file); };

  const onDrop = (e) => {
    e.preventDefault();
    setDragging(false);
    onFile(e.dataTransfer.files[0]);
  };

  const reset = () => {
    setPhase("idle");
    setDownloadUrl(null);
    if (inputRef.current) inputRef.current.value = "";
  };

  return (
    <>
      <style>{css}</style>
      <input
        ref={inputRef}
        type="file"
        accept="audio/*"
        style={{ display: "none" }}
        onChange={(e) => onFile(e.target.files[0])}
      />
      <div style={{
        minHeight: "100vh",
        background: G.bg,
        display: "flex",
        flexDirection: "column",
        alignItems: "center",
        justifyContent: "center",
        fontFamily: "'IBM Plex Mono', monospace",
        color: G.text,
        padding: "24px",
        position: "relative",
        overflow: "hidden",
      }}>
        <div style={{
          position: "absolute", inset: 0, pointerEvents: "none",
          backgroundImage: "repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.012) 2px, rgba(255,255,255,0.012) 4px)",
        }} />

        <div style={{ marginBottom: "48px", textAlign: "center", animation: "fadeIn 0.6s ease" }}>
          <div style={{ fontSize: "11px", letterSpacing: "0.3em", color: G.accent, marginBottom: "8px" }}>
            I FORGOT WHAT I PUT HERE SO THIS IS WHAT IS HERE NOW
          </div>
          <div style={{ fontSize: "32px", fontWeight: 700, letterSpacing: "0.05em" }}>
            UNWALLER
          </div>
        </div>

        {phase === "idle" && (
          <div
            onClick={() => inputRef.current.click()}
            onDrop={onDrop}
            onDragOver={(e) => { e.preventDefault(); setDragging(true); }}
            onDragLeave={() => setDragging(false)}
            style={{
              width: "100%",
              maxWidth: "480px",
              height: "220px",
              border: `1px solid ${dragging ? G.accent : G.border}`,
              borderRadius: "2px",
              display: "flex",
              flexDirection: "column",
              alignItems: "center",
              justifyContent: "center",
              cursor: "pointer",
              background: dragging ? G.accentDim : G.panel,
              transition: "all 0.15s ease",
              animation: "fadeIn 0.5s ease",
              position: "relative",
              overflow: "hidden",
            }}
          >
            <div style={{
              position: "absolute", inset: 0,
              background: dragging ? `radial-gradient(ellipse at center, ${G.accentDim} 0%, transparent 70%)` : "none",
              transition: "all 0.2s",
            }} />
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" style={{ marginBottom: "16px", opacity: dragging ? 1 : 0.4 }}>
              <path d="M12 2v12m0-12L8 6m4-4l4 4" stroke={G.accent} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
              <path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke={G.accent} strokeWidth="1.5" strokeLinecap="round" />
            </svg>
            <div style={{ fontSize: "13px", fontWeight: 700, letterSpacing: "0.2em", color: dragging ? G.accent : G.text }}>
              {dragging ? "RELEASE TO PROCESS" : "DROP AUDIO HERE"}
            </div>
            <div style={{ fontSize: "11px", color: G.muted, marginTop: "8px", letterSpacing: "0.1em" }}>
              or click to browse
            </div>
          </div>
        )}

        {phase === "processing" && (
          <div style={{
            width: "100%",
            maxWidth: "480px",
            height: "220px",
            border: `1px solid ${G.border}`,
            borderRadius: "2px",
            display: "flex",
            flexDirection: "column",
            alignItems: "center",
            justifyContent: "center",
            background: G.panel,
            animation: "fadeIn 0.3s ease",
          }}>
            <div style={{ display: "flex", alignItems: "flex-end", gap: "5px", height: "48px", marginBottom: "24px" }}>
              {["bar1","bar2","bar3","bar4","bar5"].map((anim, i) => (
                <div key={i} style={{
                  width: "5px",
                  background: G.accent,
                  borderRadius: "1px",
                  animation: `${anim} ${0.6 + i * 0.1}s ease-in-out infinite`,
                }} />
              ))}
            </div>
            <div style={{ fontSize: "11px", letterSpacing: "0.3em", color: G.accent, animation: "pulse 1.5s ease-in-out infinite" }}>
              PROCESSING
            </div>
          </div>
        )}

        {phase === "done" && (
          <div
            onDrop={(e) => { e.preventDefault(); setDragging(false); const f = e.dataTransfer.files[0]; if (f) process(f); }}
            onDragOver={(e) => { e.preventDefault(); setDragging(true); }}
            onDragLeave={() => setDragging(false)}
            style={{
              width: "100%",
              maxWidth: "480px",
              border: `1px solid ${G.border}`,
              borderRadius: "2px",
              background: G.panel,
              animation: "fadeIn 0.4s ease",
              overflow: "hidden",
            }}
          >
            <div style={{
              height: "4px",
              background: `linear-gradient(90deg, ${G.accent}, #00ccff)`,
            }} />
            <div style={{ padding: "40px 32px", textAlign: "center" }}>
              <div style={{ fontSize: "11px", letterSpacing: "0.3em", color: G.accent, marginBottom: "12px" }}>
                DONE
              </div>
              <div style={{
                fontSize: "12px",
                color: G.muted,
                marginBottom: "32px",
                letterSpacing: "0.05em",
                wordBreak: "break-all",
              }}>
                {outputName}
              </div>
              <a
                href={downloadUrl}
                download={outputName}
                style={{
                  display: "inline-block",
                  padding: "14px 40px",
                  background: G.accent,
                  color: "#000",
                  textDecoration: "none",
                  fontFamily: "'IBM Plex Mono', monospace",
                  fontSize: "12px",
                  fontWeight: 700,
                  letterSpacing: "0.2em",
                  borderRadius: "1px",
                  marginBottom: "16px",
                }}
              >
                DOWNLOAD
              </a>
              <br />
              <button
                onClick={() => { reset(); setTimeout(() => inputRef.current.click(), 50); }}
                style={{
                  background: "none",
                  border: "none",
                  color: G.muted,
                  fontFamily: "'IBM Plex Mono', monospace",
                  fontSize: "11px",
                  letterSpacing: "0.15em",
                  cursor: "pointer",
                  marginTop: "8px",
                  padding: "8px",
                }}
              >
                PROCESS ANOTHER
              </button>
            </div>
          </div>
        )}

        <div style={{
          position: "absolute",
          bottom: "24px",
          fontSize: "10px",
          color: G.muted,
          letterSpacing: "0.15em",
        }}>
          COOL
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
