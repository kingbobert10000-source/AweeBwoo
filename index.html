<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AweeBwoo</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000;
      --border: #1e1e1e;
      --border2: #2e2e2e;
      --text: #ffffff;
      --muted: #555555;
      --muted2: #888888;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 48px;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: 'Bebas Neue', cursive;
      font-size: 24px;
      letter-spacing: 0.12em;
      color: var(--text);
      text-decoration: none;
    }

    .nav-links { display: flex; gap: 32px; list-style: none; }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }

    #hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 140px 40px 80px;
      position: relative;
      overflow: hidden;
    }

    .hero-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 64px 64px;
      pointer-events: none;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 100%);
    }

    .hero-tag {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted2);
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeUp 0.8s 0.2s forwards;
    }

    .hero-title {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(90px, 18vw, 220px);
      line-height: 0.88;
      letter-spacing: 0.02em;
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp 0.8s 0.4s forwards;
    }

    .hero-subtitle {
      font-size: clamp(14px, 2vw, 19px);
      color: var(--muted2);
      max-width: 500px;
      margin-bottom: 52px;
      font-weight: 300;
      letter-spacing: 0.04em;
      opacity: 0;
      animation: fadeUp 0.8s 0.6s forwards;
    }

    .hero-cta {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 0.8s 0.8s forwards;
    }

    .btn-primary {
      background: #fff;
      color: #000;
      border: none;
      padding: 14px 34px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
      display: inline-block;
    }
    .btn-primary:hover { background: #d4d4d4; transform: translateY(-2px); }

    .btn-secondary {
      background: none;
      color: var(--text);
      border: 1px solid var(--border2);
      padding: 14px 34px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
      display: inline-block;
    }
    .btn-secondary:hover { border-color: var(--muted2); transform: translateY(-2px); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 768px) {
      nav { padding: 16px 20px; }
      .nav-links { display: none; }
      .hero-cta { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>

<nav>
  <a href="https://aweebwoo.vercel.app" class="nav-logo">AweeBwoo</a>
  <ul class="nav-links">
    <li><a href="https://aweebwoo.vercel.app/about" target="_blank" rel="noopener">About</a></li>
    <li><a href="https://discord.gg/db2dzJ73ug" target="_blank" rel="noopener">Discord</a></li>
    <li><a href="https://www.youtube.com/@AweeBwoo/featured" target="_blank" rel="noopener">YouTube</a></li>
    <li><a href="https://www.tiktok.com/@aweebwoo" target="_blank" rel="noopener">TikTok</a></li>
    <li><a href="https://www.instagram.com/awee.bwoo/reels/" target="_blank" rel="noopener">Instagram</a></li>
  </ul>
</nav>

<section id="hero">
  <div class="hero-grid"></div>
  <div class="hero-tag">Content Creator</div>
  <h1 class="hero-title">AWEEBWOO</h1>
  <p class="hero-subtitle">AI Can't Generate This</p>
  <div class="hero-cta">
    <a href="https://www.youtube.com/@AweeBwoo?sub_confirmation=1" target="_blank" rel="noopener" class="btn-primary">Subscribe</a>
    <a href="https://www.youtube.com/@AweeBwoo/videos" target="_blank" rel="noopener" class="btn-secondary">Watch Now</a>
  </div>
</section>

</body>
</html>
